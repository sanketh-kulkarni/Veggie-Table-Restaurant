<!DOCTYPE html>
<html lang="en">
<head>
	<style>
		/* General Styles */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    color: #333;
    background-color: #f4f4f9;
    line-height: 1.6;
}

/* Hero Section */
#hero {
    background: url('https://cdn.foodism.co.uk/embedded_full/5d232e8527353.jpeg') center/cover no-repeat;
    height: 100vh;
    color: white;
    text-align: center;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
}

#hero h1 {
    font-size: 3em;
    margin-bottom: 0.5em;
}

#hero button {
    background-color: #ff6600;
    color: white;
    padding: 10px 20px;
    border: none;
    cursor: pointer;
    font-size: 1.2em;
    border-radius: 5px;
    transition: background-color 0.3s;
}

#hero button:hover {
    background-color: #e65c00;
}
</style>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>

    <!-- Hero Section -->
    <header id="hero">

        <p>Where Flavor Meets Compassion</p>
        <button class="menu" onclick="window.open('proj6.html', '_blank')">Order Online / Explore Our Menu</button><br>
        <button class="menu" onclick="window.open('tableReserve.html', '_blank')">Reserve a Table</button><br>
        <button class="menu" onclick="window.open('projeab.html', '_blank')">About Us</button>
